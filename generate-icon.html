<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <title>Tạo icon Chi Tiêu</title>
  <style>
    body { font-family: sans-serif; background: #111; color: #fff; padding: 32px; text-align: center; }
    canvas { display: none; }
    .preview { display: flex; gap: 32px; justify-content: center; align-items: flex-end; margin: 32px 0; }
    .preview-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    img { border-radius: 22%; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    button { background: #4f46e5; color: white; border: none; padding: 12px 28px; border-radius: 12px; font-size: 15px; cursor: pointer; margin: 6px; }
    button:hover { background: #4338ca; }
    p { color: #9ca3af; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>Icon Generator — App Chi Tiêu</h2>
  <p>Bấm nút bên dưới để tải về icon, rồi bỏ vào thư mục <code>pwa/</code></p>

  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>

  <div class="preview">
    <div class="preview-item">
      <img id="prev512" width="128" height="128"/>
      <span style="color:#6b7280;font-size:13px">512×512</span>
    </div>
    <div class="preview-item">
      <img id="prev192" width="64" height="64"/>
      <span style="color:#6b7280;font-size:13px">192×192</span>
    </div>
  </div>

  <div>
    <button onclick="download(512)">Tải icon-512.png</button>
    <button onclick="download(192)">Tải icon-192.png</button>
  </div>
  <p>Sau khi tải xong: đặt 2 file vào cùng thư mục với <code>index.html</code> rồi upload lên Netlify lại.</p>

  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext('2d');
      const r = s * 0.22; // border-radius

      // Rounded rect clip
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.clip();

      // Background gradient
      const bg = ctx.createLinearGradient(0, 0, s, s);
      bg.addColorStop(0, '#1e1b4b');
      bg.addColorStop(0.5, '#312e81');
      bg.addColorStop(1, '#4338ca');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, s, s);

      // Inner glow circle
      const glow = ctx.createRadialGradient(s * 0.5, s * 0.42, 0, s * 0.5, s * 0.42, s * 0.48);
      glow.addColorStop(0, 'rgba(129,140,248,0.18)');
      glow.addColorStop(1, 'rgba(129,140,248,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, s, s);

      // Emoji 💸
      ctx.font = `${s * 0.48}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('💸', s * 0.5, s * 0.44);

      // Label "Chi Tiêu"
      ctx.font = `bold ${s * 0.115}px -apple-system, sans-serif`;
      ctx.fillStyle = 'rgba(255,255,255,0.88)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'alphabetic';
      ctx.fillText('Chi Tiêu', s * 0.5, s * 0.84);
    }

    const c192 = document.getElementById('c192');
    const c512 = document.getElementById('c512');
    drawIcon(c192);
    drawIcon(c512);

    document.getElementById('prev192').src = c192.toDataURL('image/png');
    document.getElementById('prev512').src = c512.toDataURL('image/png');

    function download(size) {
      const canvas = size === 192 ? c192 : c512;
      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
